openapi: 3.0.3
info:
  title: Todo Tasks API
  version: 1.0.0
  description: |
    REST API for managing todo tasks.

    This specification is generated from the current servlet implementation:
    `com.example.todo.web.TasksServlet` mapped to `/api/tasks/*`.
servers:
  - url: http://localhost:8080/my-webapp-project
    description: Local Tomcat deployment with app context path
paths:
  /api/tasks/:
    get:
      tags:
        - Tasks
      summary: List all tasks
      operationId: listTasks
      responses:
        '200':
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'
        '500':
          description: Database error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Database error
    post:
      tags:
        - Tasks
      summary: Create a task
      operationId: createTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskCreateRequest'
            examples:
              default:
                value:
                  title: Implement Labwork 4
                  completed: false
      responses:
        '201':
          description: Task created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                titleRequired:
                  value:
                    error: Title is required
        '500':
          description: Database error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Database error

  /api/tasks/{id}:
    parameters:
      - $ref: '#/components/parameters/TaskId'
    get:
      tags:
        - Tasks
      summary: Get a task by id
      operationId: getTask
      responses:
        '200':
          description: Task found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          description: Invalid task id/path format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidPath:
                  value:
                    error: Invalid path format
                invalidId:
                  value:
                    error: Task id must be an integer
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Task not found
        '500':
          description: Database error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Database error
    put:
      tags:
        - Tasks
      summary: Update a task
      operationId: updateTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskUpdateRequest'
            examples:
              completeOnly:
                value:
                  completed: true
              titleOnly:
                value:
                  title: Updated task title
              bothFields:
                value:
                  title: Updated task title
                  completed: true
      responses:
        '200':
          description: Task updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          description: Invalid id or payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingIdInPath:
                  value:
                    error: Task id is required in path
                invalidPath:
                  value:
                    error: Invalid path format
                invalidId:
                  value:
                    error: Task id must be an integer
                invalidBody:
                  value:
                    error: Invalid request body
                emptyTitle:
                  value:
                    error: Title cannot be empty
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Task not found
        '500':
          description: Database error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Database error
    delete:
      tags:
        - Tasks
      summary: Delete a task
      operationId: deleteTask
      responses:
        '200':
          description: Task deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Task deleted
        '400':
          description: Invalid id or path
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingIdInPath:
                  value:
                    error: Task id is required in path
                invalidPath:
                  value:
                    error: Invalid path format
                invalidId:
                  value:
                    error: Task id must be an integer
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Task not found
        '500':
          description: Database error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Database error

components:
  parameters:
    TaskId:
      name: id
      in: path
      required: true
      description: Integer task identifier
      schema:
        type: integer
        format: int32
        minimum: 1

  schemas:
    Task:
      type: object
      required:
        - id
        - title
        - completed
      properties:
        id:
          type: integer
          format: int32
          example: 1
        title:
          type: string
          example: Implement Labwork 4
        completed:
          type: boolean
          example: false

    TaskCreateRequest:
      type: object
      required:
        - title
      properties:
        title:
          type: string
          minLength: 1
          description: Non-empty title after trimming whitespace
        completed:
          type: boolean
          default: false

    TaskUpdateRequest:
      type: object
      description: |
        At least one of `title` or `completed` should be provided.
        If `title` is omitted, existing title is preserved.
        If `completed` is omitted, existing completed value is preserved.
      properties:
        title:
          type: string
          description: Cannot be empty string after trimming
        completed:
          type: boolean

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string

    MessageResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
